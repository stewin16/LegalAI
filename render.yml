# Render Blueprint (Infrastructure-as-Code)
# Documentation: https://render.com/docs/blueprints

services:

  # 1. RAG SERVICE (Python/Docker) - Handles Vector Search, OCR (Tesseract), and RAG
  - type: web
    name: legalai-rag
    env: docker
    region: singapore # Change to your preferred region (e.g., oregon, frankfurt)
    plan: free # Free tier (512MB RAM). Suggest 'starter' or higher for faster OCR.
    rootDir: rag_service
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set in Render Dashboard
      - key: GOOGLE_API_KEY
        sync: false # Optional (for Gemini fallback)
      - key: PORT
        value: "10000"

  # 2. NODE GATEWAY (Express) - API Gateway, Rate Limiting, and Proxy
  - type: web
    name: legalai-api
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3001"
      - key: RAG_SERVICE_URL
        sync: false # Set manually to http://legalai-rag:10000 once deployed
      - key: GROQ_API_KEY
        sync: false # Set in Render Dashboard
      - key: CORS_ORIGIN
        value: "*" # Set to your frontend URL after deployment for security

  # 3. FRONTEND (Vite/React) - Static Site
  - type: web
    name: legalai-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_RAG_API_BASE_URL
        sync: false # Set manually to the public URL of 'legalai-api'
      - key: VITE_GROQ_API_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
